name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests
        run: bun test src/core src/tui
      - name: Compile smoke test
        run: |
          bun build src/index.ts --compile --outfile dist/sapphire
          ./dist/sapphire --version
          ./dist/sapphire -w fixtures/demo board show | head -3
